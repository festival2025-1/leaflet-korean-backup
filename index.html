<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0" />
  <title>서울서커스페스티벌2026</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="menu-list" id="menuList">
    <button onclick="goToSlideInstant(1)">🎪 About Festival</button>
    <button onclick="goToSlideInstant(3)">🗓️ Timetable</button>
    <button onclick="goToSlideInstant(6)">🗺️ Map</button>
    <button onclick="goToSlideInstant(8)">🎭 About Performance</button>
  </div>

  <div class="language-switcher">
    <a href="https://krbackup.birosofest.org/" id="to-kr">Change to KR</a>
  </div>

  <div class="slider-container">
    <div class="slides-wrapper" id="slidesWrapper">

      <div class="slide"><img alt="지도 1" src="/images/map1.webp" /></div>
      <div class="slide"><img alt="지도 2" src="/images/map2.webp" /></div>
      <div class="slide"><img alt="공연 소개 1" src="/images/info1.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 소개 2" src="/images/info2.webp" loading="lazy" /></div>

      <div class="slide"><img alt="공연 소개 5" src="/images/info5.webp" loading="lazy" /></div>

      <div class="slide"><img alt="공연 소개 9" src="/images/info9.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 소개 10" src="/images/info10.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 소개 11" src="/images/info11.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 소개 12" src="/images/info12.webp" loading="lazy" /></div>

      <div class="slide"><img alt="공연 소개 17" src="/images/info17.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 소개 18" src="/images/info18.webp" loading="lazy" /></div>
      <div class="slide"><img alt="공연 프로그램" src="/images/program.webp" loading="lazy" /></div>

  <button class="nav-btn prev-btn" onclick="changeSlide(-1)">◀</button>
  <button class="nav-btn next-btn" onclick="changeSlide(1)">▶</button>

  <!-- 공지 팝업 -->
  <div id="noticePopup" class="popup" style="display:none;">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()" aria-label="공지 닫기">×</button>
      <img id="noticeImage" src="" alt="현장 공지" class="popup-img" />
    </div>
  </div>

  <script src="script.js"></script>

</html>
